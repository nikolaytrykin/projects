<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Трыкин Николай — Аналитик данных</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --card-bg: #111111;
      --border: #1e1e1e;
      --accent1: #6c63ff;
      --accent2: #00d4ff;
      --accent3: #ff6b9d;
      --text: #e8e8e8;
      --muted: #888;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Фоновая анимация */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 30%, rgba(108,99,255,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 70%, rgba(0,212,255,0.06) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 50% 50%, rgba(255,107,157,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: bgPulse 8s ease-in-out infinite alternate;
    }

    @keyframes bgPulse {
      0%   { opacity: 0.6; }
      100% { opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 52px 48px 44px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(108,99,255,0.1),
        0 20px 60px rgba(0,0,0,0.6),
        0 0 100px rgba(108,99,255,0.06);
      animation: cardIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* Тонкая полоска-градиент сверху карточки */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent1), var(--accent2), var(--accent3), transparent);
      border-radius: 1px;
      opacity: 0.7;
    }

    /* Аватар / инициалы */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      margin: 0 auto 28px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      box-shadow:
        0 0 0 3px rgba(108,99,255,0.25),
        0 0 30px rgba(108,99,255,0.3);
      animation: avatarGlow 3s ease-in-out infinite alternate;
      flex-shrink: 0;
    }

    @keyframes avatarGlow {
      from { box-shadow: 0 0 0 3px rgba(108,99,255,0.2), 0 0 20px rgba(108,99,255,0.2); }
      to   { box-shadow: 0 0 0 3px rgba(0,212,255,0.35), 0 0 40px rgba(108,99,255,0.4); }
    }

    /* Имя */
    .name {
      font-size: clamp(28px, 6vw, 38px);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 14px;
      background: linear-gradient(120deg, #fff 0%, var(--accent2) 40%, var(--accent1) 70%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 18px rgba(108,99,255,0.5));
      animation: nameShimmer 4s ease-in-out infinite alternate;
    }

    @keyframes nameShimmer {
      from { filter: drop-shadow(0 0 12px rgba(108,99,255,0.4)); }
      to   { filter: drop-shadow(0 0 26px rgba(0,212,255,0.6)); }
    }

    /* Разделитель */
    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 2px;
      margin: 0 auto 16px;
      opacity: 0.6;
    }

    /* Специализация */
    .specialization {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 36px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
    }

    .specialization strong {
      color: var(--text);
      font-weight: 600;
    }

    /* Метки-теги */
    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 36px;
    }

    .tag {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 5px 12px;
      border-radius: 100px;
      border: 1px solid;
      text-transform: uppercase;
    }

    .tag:nth-child(1) { border-color: rgba(108,99,255,0.4); color: #a09bff; background: rgba(108,99,255,0.08); }
    .tag:nth-child(2) { border-color: rgba(0,212,255,0.35); color: #5ce0f5; background: rgba(0,212,255,0.07); }
    .tag:nth-child(3) { border-color: rgba(255,107,157,0.35); color: #ff9dc0; background: rgba(255,107,157,0.07); }

    /* Кнопка */
    .btn-wrap {
      perspective: 600px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 36px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg);
      transition: left 0.5s ease;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 36px rgba(108,99,255,0.55);
    }

    .btn:hover::after { left: 150%; }

    .btn:active { transform: translateY(0) scale(0.98); }

    .btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Футер */
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #333;
      letter-spacing: 0.5px;
    }

    /* Плавающие частицы */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0;    transform: translateY(0)    scale(0); }
      10%  { opacity: 0.6; }
      80%  { opacity: 0.2; }
      100% { opacity: 0;    transform: translateY(-100vh) scale(1); }
    }

    /* Адаптив */
    @media (max-width: 480px) {
      .card { padding: 40px 28px 36px; border-radius: 20px; }
      .avatar { width: 76px; height: 76px; font-size: 26px; }
    }
  </style>
</head>
<body>

<!-- Частицы -->
<div class="particles" id="particles"></div>

<div class="card">

  <div class="avatar">НТ</div>

  <h1 class="name">Трыкин Николай</h1>

  <div class="divider"></div>

  <p class="specialization">
    <strong>Аналитик</strong> &nbsp;·&nbsp; Специалист по большим данным
  </p>

  <div class="tags">
    <span class="tag">Аналитика</span>
    <span class="tag">Big Data</span>
    <span class="tag">Data Science</span>
  </div>

  <div class="btn-wrap">
    <a href="https://t.me/NikolayTrykin" class="btn" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
      </svg>
      Написать мне
    </a>
  </div>

  <div class="footer">© 2025 Трыкин Николай</div>

</div>

<script>
  // Генерация плавающих частиц
  (function () {
    const container = document.getElementById('particles');
    const colors = ['#6c63ff', '#00d4ff', '#ff6b9d', '#a78bfa'];
    const count = 22;

    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = [
        `width:${size}px`,
        `height:${size}px`,
        `left:${Math.random() * 100}%`,
        `top:${Math.random() * 100 + 100}%`,
        `background:${colors[Math.floor(Math.random() * colors.length)]}`,
        `animation-duration:${Math.random() * 12 + 8}s`,
        `animation-delay:${Math.random() * 10}s`,
      ].join(';');
      container.appendChild(p);
    }
  })();
</script>

</body>
</html>
